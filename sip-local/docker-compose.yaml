services:
  redis:
    image: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - 6379:6379

  livekit:
    image: livekit/livekit-server
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    network_mode: host
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    depends_on:
      redis:
        condition: service_started

  sip:
    image: livekit/sip:local
    restart: unless-stopped
    network_mode: host
    environment:
      SIP_CONFIG_BODY: |
        api_key: 'devkey'
        api_secret: 'a09ad780a86a515f54dcff0799632b9b7ad7bf6da825d8118ffb5613cdf406a1'
        ws_url: 'ws://localhost:7880'
        redis:
          address: 'localhost:6379'
        sip_port: 5060
        rtp_port: 10000-10004
        use_external_ip: true
        symmetric_rtp: true
        logging:
          level: debug

volumes:
  redis_data:
